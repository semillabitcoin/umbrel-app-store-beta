manifestVersion: 1
id: semillabitcoin-beta-lendingfolio
category: finance
name: LendingFolio
version: "0.1.23-beta"
tagline: Track your P2P Bitcoin loans, sovereignly
description: >-
  LendingFolio is a private portfolio tracker for P2P Bitcoin lending
  (Hodl Hodl, Debifi, Lendasat, Firefish). Track loans, collateral, LTV /
  margin-call & liquidation maps, repayments, BTC holdings and stablecoin
  balances, with a clean dashboard for lenders and borrowers.

  Sovereign by design: your data is stored on your Umbrel under /data
  (mainnet and testnet kept separate), never in a browser you might clear.
  BTC on-chain data can be read from your own node; stablecoin balances are
  entered manually (their chains live outside Bitcoin), with optional,
  off-by-default external verification.

  Mainnet and testnet (Signet + Sepolia) in one app. No accounts, no tracking.
releaseNotes: >-
  v0.1.6-beta: privacy egress gateway. On-chain lookups use YOUR local servers when available
  (electrs for BTC); anything without a local server (BTC testnet, Liquid) goes out OVER TOR by
  default, so your IP and addresses are never revealed to a third party. New Settings toggle
  "external requests in the clear (no Tor)" to opt out. The browser never calls explorers
  directly — the backend is the single egress point.

  v0.1.2-beta: native BTC on-chain reads from YOUR node — the backend auto-detects a
  local electrs (Electrum) and uses it for address balances, tx status and fees. No manual
  config. Plus everything from v0.1.1.

  v0.1.1-beta: light theme is now the default; in the liquidation map the
  counterparty name is clickable and opens that loan; in-app feedback (✉️, NIP-17
  over Nostr) with a robust outbox (retries on boot, no silent loss). Persistence
  to /data per network with localStorage migration. BTC on-chain verification
  reports "capability unavailable" until an electrs provider is wired (no silent
  external calls). Stablecoin balances are manual; external verification is
  opt-in/OFF. Dashboard gated behind Umbrel login.
