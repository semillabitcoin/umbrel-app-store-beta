manifestVersion: 1
id: semillabitcoin-beta-broadcast-pool
category: bitcoin
name: BP beta
version: "0.3.21-beta.2"
tagline: Broadcast Pool — canal BETA (no usar en producción)
description: >-
  Versión BETA de Broadcast Pool para pruebas antes de publicar en la tienda
  estable. Proxy Electrum que retiene transacciones firmadas y las difunde por
  bloque, fecha (MTP) o precio.

  Novedades en prueba (v0.3.21): fallback al nodo Bitcoin (Core/Knots/Libre
  Relay) cuando electrs cae, cifrado at-rest AES-256-GCM, fix de difusión por
  precio y endurecimiento varios.

  AVISO: canal beta. Instálalo en un nodo de pruebas o asume que los datos
  podrían no migrar limpiamente. La versión estable vive en la tienda
  principal de Semilla Bitcoin.
releaseNotes: >-
  v0.3.21-beta.2 — Indicador siempre visible del respaldo al nodo Bitcoin
  (en espera / activo / no disponible), con health-check proactivo. Barrido
  de cifrado al arranque: cifra cualquier tx que quedara en claro en disco
  por versiones previas. Incluye: fallback al nodo cuando electrs no
  responde (altura/MTP, difusión, confirmaciones), cifrado AES-256-GCM
  (ENC:v2) compatible con datos previos, fix de retransmisión por precio,
  política pre-broadcast centralizada, aiohttp 3.14.1, panel tras login.
